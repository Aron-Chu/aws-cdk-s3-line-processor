language: en-US
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: false
  poem: false
  review_status: false
  review_details: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  pre_merge_checks:
    docstrings:
      mode: off
  path_filters:
    - "!**/*.md"
    - "!docs/**"
    - "!cdk.out/**"
    - "!coverage/**"
    - "!.coverage"
    - "!.pytest_cache/**"
    - "!**/__pycache__/**"
    - "!samples/**"
  path_instructions:
    - path: "s3_line_processor/**/*.py"
      instructions: |
        Flag only concrete security or deployability bugs: public S3 access, missing encryption or versioning, wildcard IAM, managed policies, Lambda S3 writes, missing HTTPS deny, broad invocation, unscoped log writes, or circular notification dependencies.
    - path: "lambda_src/**/*.py"
      instructions: |
        Flag only concrete runtime bugs: unbounded reads, bad key/version handling, content logging, swallowed operational errors, incorrect one-line JSON validation, or first-record-only processing.
    - path: "tests/**/*.py"
      instructions: |
        Flag missing coverage only for security properties, parser boundaries, or operational error propagation.
    - path: ".github/workflows/*.yml"
      instructions: |
        Flag broad permissions, AWS access in PR CI, unpinned actions, missing production protection, or unrestricted OIDC trust.
    - path: "requirements*.txt"
      instructions: |
        Flag unpinned or unnecessary runtime dependencies.
    - path: "package.json"
      instructions: |
        Flag unpinned CDK CLI versions. Do not require aws-cdk and aws-cdk-lib numeric versions to match.
chat:
  auto_reply: false
