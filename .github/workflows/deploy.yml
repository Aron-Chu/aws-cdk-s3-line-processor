name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy.yml"
      - ".python-version"
      - "Makefile"
      - "app.py"
      - "cdk.json"
      - "lambda_src/**"
      - "package.json"
      - "package-lock.json"
      - "pyproject.toml"
      - "requirements*.txt"
      - "s3_line_processor/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  validate:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Verify default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$GITHUB_REF" != "refs/heads/$DEFAULT_BRANCH" ]; then
            echo "Deployments must run from the default branch." >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements.lock

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          python -m venv .venv
          .venv/bin/python -m pip install --require-hashes -r requirements.lock

      - name: Validate
        run: |
          make lock-check
          .venv/bin/pre-commit run --all-files
          .venv/bin/pytest
          source .venv/bin/activate
          npx cdk synth --quiet

  plan:
    needs: validate
    outputs:
      change_set_name: ${{ steps.prepare.outputs.change_set_name }}
      commit_sha: ${{ steps.prepare.outputs.commit_sha }}
      has_changes: ${{ steps.prepare.outputs.has_changes }}
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - name: Verify default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$GITHUB_REF" != "refs/heads/$DEFAULT_BRANCH" ]; then
            echo "Deployments must run from the default branch." >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements.lock

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          python -m venv .venv
          .venv/bin/python -m pip install --require-hashes -r requirements.lock

      - name: Synthesize
        run: |
          source .venv/bin/activate
          npx cdk synth --quiet

      - name: Mask deploy role ARN
        env:
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
        run: echo "::add-mask::$AWS_ROLE_ARN"

      - name: Configure temporary AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: github-actions-cdk-deploy
          mask-aws-account-id: true

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Prepare CloudFormation change set
        id: prepare
        env:
          CHANGE_SET_NAME: s3-line-processor-${{ github.sha }}-${{ github.run_id }}
        run: |
          echo "change_set_name=$CHANGE_SET_NAME" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          source .venv/bin/activate
          # cdk diff may exit 1 when differences exist; keep going.
          set +e
          npx cdk diff --no-color | tee cdk-diff.txt
          diff_status=${PIPESTATUS[0]}
          set -e
          if [ "$diff_status" -ne 0 ] && [ "$diff_status" -ne 1 ]; then
            echo "cdk diff failed with exit code $diff_status" >&2
            exit "$diff_status"
          fi
          if grep -qE 'Number of stacks with differences: 0|There were no differences' cdk-diff.txt; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No CloudFormation differences; skipping change-set prepare."
            exit 0
          fi
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          npx cdk deploy \
            --method prepare-change-set \
            --change-set-name "$CHANGE_SET_NAME" \
            --require-approval never

      - name: Publish plan summary
        env:
          CHANGE_SET_NAME: ${{ steps.prepare.outputs.change_set_name }}
        run: |
          {
            echo "## Prepared production change set"
            echo
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Change set: \`$CHANGE_SET_NAME\`"
            if [ "${{ steps.prepare.outputs.has_changes }}" = "true" ]; then
              echo "- Review the \`production-change-set-$GITHUB_SHA\` artifact before approving the execute job."
            else
              echo "- No resource differences; execute job will be skipped."
            fi
            echo
            echo '```text'
            cat cdk-diff.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload immutable plan evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: production-change-set-${{ github.sha }}
          path: cdk-diff.txt
          if-no-files-found: error
          retention-days: 30

  deploy:
    needs: plan
    if: needs.plan.outputs.has_changes == 'true'
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - name: Verify planned commit
        env:
          PLANNED_SHA: ${{ needs.plan.outputs.commit_sha }}
        run: |
          if [ "$GITHUB_SHA" != "$PLANNED_SHA" ]; then
            echo "Prepared commit $PLANNED_SHA does not match execution commit $GITHUB_SHA." >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements.lock

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          python -m venv .venv
          .venv/bin/python -m pip install --require-hashes -r requirements.lock

      - name: Synthesize
        run: |
          source .venv/bin/activate
          npx cdk synth --quiet

      - name: Download approved plan evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: production-change-set-${{ github.sha }}
          path: plan-evidence

      - name: Mask deploy role ARN
        env:
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
        run: echo "::add-mask::$AWS_ROLE_ARN"

      - name: Configure temporary AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: github-actions-cdk-execute
          mask-aws-account-id: true

      - name: Execute approved change set
        env:
          CHANGE_SET_NAME: ${{ needs.plan.outputs.change_set_name }}
        run: |
          aws sts get-caller-identity
          test -f plan-evidence/cdk-diff.txt
          source .venv/bin/activate
          npx cdk deploy \
            --method execute-change-set \
            --change-set-name "$CHANGE_SET_NAME" \
            --require-approval never
