name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy.yml"
      - ".python-version"
      - "Makefile"
      - "app.py"
      - "cdk.json"
      - "lambda_src/**"
      - "package.json"
      - "package-lock.json"
      - "pyproject.toml"
      - "requirements.lock"
      - "requirements*.txt"
      - "s3_line_processor/**"
      - "scripts/mask_stack_outputs.sh"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  CHANGE_SET_PROJECTION: >-
    {
      ChangeSetName,
      ChangeSetId,
      StackId,
      StackName,
      Description,
      Parameters,
      ExecutionStatus,
      Status,
      StatusReason,
      StackDriftStatus,
      NotificationARNs,
      RollbackConfiguration,
      Capabilities,
      Tags,
      Changes,
      IncludeNestedStacks,
      ParentChangeSetId,
      RootChangeSetId,
      OnStackFailure,
      ImportExistingResources,
      DeploymentMode,
      DeploymentConfig
    }

jobs:
  validate:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Verify default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$GITHUB_REF" != "refs/heads/$DEFAULT_BRANCH" ]; then
            echo "Deployments must run from the default branch." >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements.lock

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          python -m venv .venv
          .venv/bin/python -m pip install --require-hashes -r requirements.lock

      - name: Validate
        run: |
          make lock-check
          .venv/bin/pre-commit run --all-files
          .venv/bin/pytest
          source .venv/bin/activate
          npx cdk synth --quiet
          git diff --exit-code

  plan:
    needs: validate
    outputs:
      artifact_name: ${{ steps.prepare.outputs.artifact_name }}
      change_set_name: ${{ steps.prepare.outputs.change_set_name }}
      commit_sha: ${{ steps.prepare.outputs.commit_sha }}
      has_changes: ${{ steps.prepare.outputs.has_changes }}
      change_set_id: ${{ steps.prepare.outputs.change_set_id }}
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - name: Verify default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$GITHUB_REF" != "refs/heads/$DEFAULT_BRANCH" ]; then
            echo "Deployments must run from the default branch." >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements.lock

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          python -m venv .venv
          .venv/bin/python -m pip install --require-hashes -r requirements.lock

      - name: Synthesize
        run: |
          source .venv/bin/activate
          npx cdk synth --quiet

      - name: Configure temporary AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: cdk-plan-${{ github.run_id }}
          role-duration-seconds: 900
          allowed-account-ids: ${{ secrets.AWS_ACCOUNT_ID }}
          mask-aws-account-id: true
          unset-current-credentials: true

      - name: Verify AWS identity
        run: aws sts get-caller-identity --query Account --output text >/dev/null

      - name: Mask existing stack output values
        run: bash scripts/mask_stack_outputs.sh S3LineProcessorStack

      - name: Prepare CloudFormation change set
        id: prepare
        env:
          ARTIFACT_NAME: production-change-set-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          CHANGE_SET_NAME: s3-line-processor-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          EXPECTED_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          [[ "$EXPECTED_ACCOUNT_ID" =~ ^[0-9]{12}$ ]]
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "change_set_name=$CHANGE_SET_NAME" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          source .venv/bin/activate
          npx cdk deploy S3LineProcessorStack \
            --method prepare-change-set \
            --change-set-name "$CHANGE_SET_NAME" \
            --require-approval never
          mkdir -p plan-evidence
          aws cloudformation describe-change-set \
            --stack-name S3LineProcessorStack \
            --change-set-name "$CHANGE_SET_NAME" \
            --output json > /tmp/change-set.json
          status="$(jq -r '.Status' /tmp/change-set.json)"
          execution_status="$(jq -r '.ExecutionStatus' /tmp/change-set.json)"
          status_reason="$(jq -r '.StatusReason // ""' /tmp/change-set.json)"
          change_count="$(jq '.Changes | length' /tmp/change-set.json)"
          change_set_id="$(jq -r '.ChangeSetId' /tmp/change-set.json)"
          redacted_change_set_id="${change_set_id/$EXPECTED_ACCOUNT_ID/<ACCOUNT_ID>}"
          test "$redacted_change_set_id" != "$change_set_id"
          echo "change_set_id=$redacted_change_set_id" >> "$GITHUB_OUTPUT"
          if [ "$status" = "FAILED" ] && { \
            [[ "$status_reason" == "The submitted information didn't contain changes."* ]] || \
            [[ "$status_reason" == "No updates are to be performed."* ]]; \
          }; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          elif [ "$status" = "CREATE_COMPLETE" ] && \
            [ "$execution_status" = "AVAILABLE" ] && \
            [ "$change_count" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "Prepared change set is not reviewable: status=$status execution_status=$execution_status" >&2
            exit 1
          fi
          jq -S "$CHANGE_SET_PROJECTION" /tmp/change-set.json | \
            sed "s/$EXPECTED_ACCOUNT_ID/<ACCOUNT_ID>/g" \
              > plan-evidence/change-set.json
          jq -r '
            (
              ["Action", "Logical ID", "Resource type", "Replacement"],
              ["---", "---", "---", "---"],
              (.Changes[] | .ResourceChange |
                [.Action, .LogicalResourceId, .ResourceType, (.Replacement // "n/a")])
            ) |
            "| " + join(" | ") + " |"
          ' plan-evidence/change-set.json > plan-evidence/change-set.md

      - name: Publish plan summary
        env:
          CHANGE_SET_NAME: ${{ steps.prepare.outputs.change_set_name }}
        run: |
          {
            echo "## Prepared production change set"
            echo
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Change set: \`$CHANGE_SET_NAME\`"
            if [ "${{ steps.prepare.outputs.has_changes }}" = "true" ]; then
              echo "- Review the exact CloudFormation plan below and its JSON artifact before approving execution."
            else
              echo "- The prepared change set is empty; execution will be skipped."
            fi
            echo
            cat plan-evidence/change-set.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Include mask helper in plan evidence
        run: cp scripts/mask_stack_outputs.sh plan-evidence/mask_stack_outputs.sh

      - name: Upload immutable plan evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.prepare.outputs.artifact_name }}
          path: plan-evidence/
          if-no-files-found: error
          retention-days: 30

  deploy:
    needs: plan
    if: needs.plan.outputs.has_changes == 'true'
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - name: Download approved plan evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.plan.outputs.artifact_name }}
          path: plan-evidence

      - name: Verify approved evidence
        env:
          CHANGE_SET_NAME: ${{ needs.plan.outputs.change_set_name }}
          PLANNED_SHA: ${{ needs.plan.outputs.commit_sha }}
          CHANGE_SET_ID: ${{ needs.plan.outputs.change_set_id }}
        run: |
          test "$GITHUB_SHA" = "$PLANNED_SHA"
          test "$(jq -r '.ChangeSetName' plan-evidence/change-set.json)" = "$CHANGE_SET_NAME"
          test "$(jq -r '.ChangeSetId' plan-evidence/change-set.json)" = "$CHANGE_SET_ID"
          test "$(jq -r '.Status' plan-evidence/change-set.json)" = "CREATE_COMPLETE"
          test "$(jq -r '.ExecutionStatus' plan-evidence/change-set.json)" = "AVAILABLE"
          test "$(jq '.Changes | length' plan-evidence/change-set.json)" -gt 0

      - name: Configure temporary AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: cdk-execute-${{ github.run_id }}
          role-duration-seconds: 900
          allowed-account-ids: ${{ secrets.AWS_ACCOUNT_ID }}
          mask-aws-account-id: true
          unset-current-credentials: true

      - name: Mask existing stack output values
        run: bash plan-evidence/mask_stack_outputs.sh S3LineProcessorStack

      - name: Execute approved change set
        env:
          CHANGE_SET_NAME: ${{ needs.plan.outputs.change_set_name }}
          APPROVED_CHANGE_SET_ID: ${{ needs.plan.outputs.change_set_id }}
          EXPECTED_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          [[ "$EXPECTED_ACCOUNT_ID" =~ ^[0-9]{12}$ ]]
          aws sts get-caller-identity --query Account --output text >/dev/null
          aws cloudformation describe-change-set \
            --stack-name S3LineProcessorStack \
            --change-set-name "$CHANGE_SET_NAME" \
            --output json > /tmp/live-change-set.json
          live_id="$(jq -r '.ChangeSetId' /tmp/live-change-set.json)"
          approved_id="${APPROVED_CHANGE_SET_ID/<ACCOUNT_ID>/$EXPECTED_ACCOUNT_ID}"
          test "$live_id" = "$approved_id"
          jq -S "$CHANGE_SET_PROJECTION" /tmp/live-change-set.json | \
            sed "s/$EXPECTED_ACCOUNT_ID/<ACCOUNT_ID>/g" \
              > /tmp/reviewed-live-change-set.json
          jq -S -c . plan-evidence/change-set.json > /tmp/approved-change-set.json
          jq -S -c . /tmp/reviewed-live-change-set.json > /tmp/live-change-set.jsonl
          cmp --silent /tmp/approved-change-set.json /tmp/live-change-set.jsonl
          pre_execution_status="$(aws cloudformation describe-stacks \
            --stack-name S3LineProcessorStack \
            --query 'Stacks[0].StackStatus' \
            --output text)"
          case "$pre_execution_status" in
            REVIEW_IN_PROGRESS)
              deployment_operation="CREATE"
              ;;
            CREATE_COMPLETE|UPDATE_COMPLETE|UPDATE_ROLLBACK_COMPLETE|IMPORT_COMPLETE|IMPORT_ROLLBACK_COMPLETE)
              deployment_operation="UPDATE"
              ;;
            *)
              echo "Stack is not ready for change-set execution: $pre_execution_status" >&2
              exit 1
              ;;
          esac
          aws cloudformation execute-change-set \
            --stack-name S3LineProcessorStack \
            --change-set-name "$live_id" \
            --client-request-token "execute-${GITHUB_RUN_ID}"
          execution_started=false
          for _ in $(seq 1 60); do
            execution_status="$(aws cloudformation describe-change-set \
              --stack-name S3LineProcessorStack \
              --change-set-name "$live_id" \
              --query 'ExecutionStatus' \
              --output text)"
            case "$execution_status" in
              EXECUTE_IN_PROGRESS|EXECUTE_COMPLETE)
                execution_started=true
                break
                ;;
              AVAILABLE)
                sleep 2
                ;;
              *)
                echo "Change-set execution entered unexpected state: $execution_status" >&2
                exit 1
                ;;
            esac
          done
          if [ "$execution_started" != "true" ]; then
            echo "Change-set execution did not start within 120 seconds." >&2
            exit 1
          fi
          if [ "$deployment_operation" = "CREATE" ]; then
            aws cloudformation wait stack-create-complete \
              --stack-name S3LineProcessorStack
            expected_status="CREATE_COMPLETE"
          else
            aws cloudformation wait stack-update-complete \
              --stack-name S3LineProcessorStack
            expected_status="UPDATE_COMPLETE"
          fi
          final_status="$(aws cloudformation describe-stacks \
            --stack-name S3LineProcessorStack \
            --query 'Stacks[0].StackStatus' \
            --output text)"
          test "$final_status" = "$expected_status"
