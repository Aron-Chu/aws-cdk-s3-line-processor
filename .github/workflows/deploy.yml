name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - name: Verify default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$GITHUB_REF_NAME" != "$DEFAULT_BRANCH" ]; then
            echo "Deployments must run from the default branch." >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          python -m venv .venv
          .venv/bin/python -m pip install -r requirements-dev.txt

      - name: Validate
        run: |
          .venv/bin/ruff format --check .
          .venv/bin/ruff check .
          .venv/bin/pytest
          source .venv/bin/activate
          npx cdk synth --quiet

      - name: Configure temporary AWS credentials
        uses: aws-actions/configure-aws-credentials@f79bc868ee9ca4687c7db10f05fe6a46cdcda892 # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: github-actions-cdk-deploy
          mask-aws-account-id: true

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Review deployment diff
        run: source .venv/bin/activate && npx cdk diff --no-color

      - name: Deploy
        run: source .venv/bin/activate && npx cdk deploy --require-approval never
