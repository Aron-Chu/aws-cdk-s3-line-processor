[tool.ruff]
target-version = "py314"
line-length = 88
extend-exclude = ["cdk.out"]

[tool.ruff.lint]
select = ["B", "E", "F", "I", "SIM", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = [
    "--strict-config",
    "--strict-markers",
    "--cov=lambda_src",
    "--cov=s3_line_processor",
    "--cov-report=term-missing",
]

[tool.coverage.run]
branch = true

[tool.coverage.report]
fail_under = 95
show_missing = true
skip_covered = true
